<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="chatgpt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8c6d"/>
    </linearGradient>
    <linearGradient id="perplexity" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20808d"/>
      <stop offset="100%" stop-color="#1a6b76"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#c4915e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="40" y="40" font-size="18" font-weight="700" fill="#1a1a2e">LLM Referral Sessions by Source</text>
  <text x="40" y="62" font-size="12" fill="#6b7280">90-day window (Jan 14 - Apr 13, 2026) | GA4 Property 487238294</text>

  <!-- Chart area -->
  <!-- Y-axis labels -->
  <text x="80" y="110" font-size="11" fill="#9ca3af" text-anchor="end">10</text>
  <text x="80" y="170" font-size="11" fill="#9ca3af" text-anchor="end">8</text>
  <text x="80" y="230" font-size="11" fill="#9ca3af" text-anchor="end">6</text>
  <text x="80" y="290" font-size="11" fill="#9ca3af" text-anchor="end">4</text>
  <text x="80" y="350" font-size="11" fill="#9ca3af" text-anchor="end">2</text>
  <text x="80" y="395" font-size="11" fill="#9ca3af" text-anchor="end">0</text>

  <!-- Grid lines -->
  <line x1="90" y1="106" x2="700" y2="106" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="166" x2="700" y2="166" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="226" x2="700" y2="226" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="286" x2="700" y2="286" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="346" x2="700" y2="346" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="90" y1="394" x2="700" y2="394" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Bars -->
  <!-- ChatGPT: 10 sessions -->
  <rect x="160" y="106" width="120" height="288" fill="url(#chatgpt)" rx="6"/>
  <text x="220" y="96" font-size="16" font-weight="700" fill="#10a37f" text-anchor="middle">10</text>
  <text x="220" y="94" font-size="10" fill="#6b7280" text-anchor="middle" dy="-14">77%</text>

  <!-- Perplexity: 2 sessions -->
  <rect x="340" y="346" width="120" height="48" fill="url(#perplexity)" rx="6"/>
  <text x="400" y="336" font-size="16" font-weight="700" fill="#20808d" text-anchor="middle">2</text>
  <text x="400" y="334" font-size="10" fill="#6b7280" text-anchor="middle" dy="-14">15%</text>

  <!-- Claude: 1 session -->
  <rect x="520" y="370" width="120" height="24" fill="url(#claude)" rx="6"/>
  <text x="580" y="360" font-size="16" font-weight="700" fill="#d4a574" text-anchor="middle">1</text>
  <text x="580" y="358" font-size="10" fill="#6b7280" text-anchor="middle" dy="-14">8%</text>

  <!-- X-axis labels -->
  <text x="220" y="420" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">ChatGPT</text>
  <text x="400" y="420" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Perplexity</text>
  <text x="580" y="420" font-size="13" font-weight="600" fill="#374151" text-anchor="middle">Claude</text>

  <!-- Total annotation -->
  <rect x="620" y="90" width="160" height="70" fill="white" stroke="#e5e7eb" rx="8"/>
  <text x="700" y="112" font-size="11" fill="#6b7280" text-anchor="middle">Total Sessions</text>
  <text x="700" y="140" font-size="28" font-weight="800" fill="#1a1a2e" text-anchor="middle">13</text>
  <text x="700" y="155" font-size="10" fill="#6b7280" text-anchor="middle">12 unique users</text>
</svg>