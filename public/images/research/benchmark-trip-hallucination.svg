<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#451a03" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="900" height="560" fill="transparent"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#431407" font-size="20" font-weight="800">"I'm planning a trip next weekend"</text>
  <text x="450" y="58" text-anchor="middle" fill="#78716C" font-size="13">User said: just conversation. Expected: no action. What happened:</text>

  <!-- User message bubble -->
  <g transform="translate(300, 80)">
    <rect x="0" y="0" width="300" height="56" rx="28" fill="#0EA5E9" filter="url(#shadow2)"/>
    <text x="150" y="32" text-anchor="middle" fill="#fff" font-size="15" font-weight="600">"I'm planning a trip next weekend"</text>
    <text x="150" y="70" text-anchor="middle" fill="#78716C" font-size="11">the user, just making conversation</text>
  </g>

  <!-- Two columns: "Understood context" vs "Took action anyway" -->

  <!-- Column headers -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="360" height="36" rx="8" fill="#84CC16" opacity="0.15"/>
    <text x="20" y="23" fill="#365314" font-size="13" font-weight="700">✓ Recognized as chat</text>
    <text x="340" y="23" text-anchor="end" fill="#365314" font-size="11" font-weight="600">6 of 8 models</text>
  </g>
  <g transform="translate(460, 180)">
    <rect x="0" y="0" width="360" height="36" rx="8" fill="#DC2626" opacity="0.15"/>
    <text x="20" y="23" fill="#7F1D1D" font-size="13" font-weight="700">✗ Booked something anyway</text>
    <text x="340" y="23" text-anchor="end" fill="#7F1D1D" font-size="11" font-weight="600">2 of 8 models</text>
  </g>

  <!-- Correct responses (left) -->
  <g transform="translate(80, 230)">
    <!-- Claude Opus -->
    <rect x="0" y="0" width="360" height="60" rx="10" fill="#fff" stroke="#84CC16" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="14" y="22" fill="#431407" font-size="12" font-weight="700">Claude Opus</text>
    <text x="14" y="44" fill="#78716C" font-size="12" font-style="italic">"Sounds fun! Where are you headed?"</text>

    <!-- GPT-4.1 -->
    <rect x="0" y="70" width="360" height="60" rx="10" fill="#fff" stroke="#84CC16" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="14" y="92" fill="#431407" font-size="12" font-weight="700">GPT-4.1</text>
    <text x="14" y="114" fill="#78716C" font-size="12" font-style="italic">"That's exciting! Let me know if you'd like help planning..."</text>

    <!-- Claude Sonnet -->
    <rect x="0" y="140" width="360" height="60" rx="10" fill="#fff" stroke="#84CC16" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="14" y="162" fill="#431407" font-size="12" font-weight="700">Claude Sonnet</text>
    <text x="14" y="184" fill="#78716C" font-size="12" font-style="italic">"A trip next weekend sounds great! Want to plan it together?"</text>

    <!-- summary -->
    <rect x="0" y="210" width="360" height="48" rx="10" fill="#ECFCCB"/>
    <text x="14" y="232" fill="#365314" font-size="12" font-weight="600">Also: Claude Haiku, GPT-5.4, DeepSeek V3</text>
    <text x="14" y="250" fill="#78716C" font-size="11">All responded conversationally with no tool call.</text>
  </g>

  <!-- Hallucinated responses (right) -->
  <g transform="translate(460, 230)">
    <!-- GPT-4o-mini -->
    <rect x="0" y="0" width="360" height="140" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="14" y="22" fill="#7F1D1D" font-size="12" font-weight="700">GPT-4o-mini</text>
    <rect x="14" y="32" width="140" height="18" rx="4" fill="#FECACA"/>
    <text x="22" y="45" fill="#7F1D1D" font-size="10" font-weight="700" font-family="ui-monospace, monospace">calendar.create_event</text>
    <text x="14" y="72" fill="#78716C" font-size="12" font-style="italic">Created an event: "Trip Planning"</text>
    <text x="14" y="94" fill="#78716C" font-size="11">Date: next Saturday, all-day</text>
    <text x="14" y="112" fill="#78716C" font-size="11">Category: Family</text>
    <text x="14" y="130" fill="#991B1B" font-size="10" font-weight="600">→ 19 of 42 non-action trials ended this way</text>

    <!-- Gemini Flash -->
    <rect x="0" y="150" width="360" height="108" rx="10" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.5" filter="url(#shadow2)"/>
    <text x="14" y="172" fill="#7F1D1D" font-size="12" font-weight="700">Gemini Flash</text>
    <rect x="14" y="182" width="140" height="18" rx="4" fill="#FECACA"/>
    <text x="22" y="195" fill="#7F1D1D" font-size="10" font-weight="700" font-family="ui-monospace, monospace">calendar.create_event</text>
    <text x="14" y="222" fill="#78716C" font-size="12" font-style="italic">"Okay! I've created an event called 'Trip'</text>
    <text x="14" y="240" fill="#78716C" font-size="12" font-style="italic">for next weekend (April 26 – April 27)."</text>
  </g>

  <!-- Takeaway callout -->
  <g transform="translate(80, 510)">
    <rect x="0" y="0" width="740" height="36" rx="18" fill="#431407"/>
    <text x="370" y="23" text-anchor="middle" fill="#FDE68A" font-size="13" font-weight="600">Takeaway: "eager to act" is a real failure mode, and it's not correlated with price.</text>
  </g>
</svg>
