<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="800" height="450" fill="#fafafa" rx="12"/>

  <text x="40" y="42" font-size="18" font-weight="700" fill="#1a1a2e">The corpus, honestly graded</text>
  <text x="40" y="64" font-size="12" fill="#6b7280">Tier sizes and grades from my own internal audit — published on purpose</text>

  <!-- scale: 1000 -> 560px, so px = count * 0.56 -->
  <!-- Tier 1: ~80 hero -->
  <text x="40" y="118" font-size="14" font-weight="600" fill="#1a1a2e">~80 hero lists</text>
  <text x="40" y="136" font-size="11.5" fill="#6b7280">hand-crafted, 40–100+ items</text>
  <rect x="230" y="100" width="45" height="42" rx="8" fill="#2D5A3D"/>
  <text x="289" y="127" font-size="13" font-weight="700" fill="#2D5A3D">"EXCELLENT"</text>

  <!-- Tier 2: ~200 config-expanded -->
  <text x="40" y="198" font-size="14" font-weight="600" fill="#1a1a2e">~200 expanded</text>
  <text x="40" y="216" font-size="11.5" fill="#6b7280">generated variants of strong lists</text>
  <rect x="230" y="180" width="112" height="42" rx="8" fill="#5AAE8A"/>
  <text x="356" y="207" font-size="13" font-weight="700" fill="#3e7a55">"GOOD"</text>

  <!-- Tier 3: ~1000 bulk -->
  <text x="40" y="278" font-size="14" font-weight="600" fill="#1a1a2e">~1,000 bulk</text>
  <text x="40" y="296" font-size="11.5" fill="#6b7280">theme × audience cross products</text>
  <rect x="230" y="260" width="530" height="42" rx="8" fill="#efb95c"/>
  <text x="244" y="287" font-size="13" font-weight="700" fill="#6b4a08">"NEEDS ATTENTION"</text>

  <!-- the point -->
  <line x1="40" y1="338" x2="760" y2="338" stroke="#e5e7eb" stroke-width="1"/>
  <text x="40" y="372" font-size="14" fill="#374151">The bulk tier is why the grading machinery exists: quality is 30% of ranking,</text>
  <text x="40" y="392" font-size="14" fill="#374151">so the thin pages sink while the review agent files fixes against them.</text>

  <text x="40" y="424" font-size="11" fill="#9ca3af">Tier counts and grades: internal Public Lists SEO audit · peterghiorse.com</text>
</svg>
