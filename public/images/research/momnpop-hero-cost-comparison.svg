<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="heroBgGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(20)">
      <stop offset="0%" stop-color="#5AAE8A"/>
      <stop offset="50%" stop-color="#48946F"/>
      <stop offset="100%" stop-color="#3A7A56"/>
    </linearGradient>
    <symbol id="hdHeart" viewBox="0 0 512 512">
      <path d="M256 380 C 200 340, 152 300, 136 250 C 120 200, 144 165, 184 160 C 216 155, 240 165, 256 185 C 272 165, 296 155, 328 160 C 368 165, 392 200, 376 250 C 360 300, 312 340, 256 380 Z" fill="currentColor"/>
    </symbol>
  </defs>
  <rect width="1200" height="630" fill="url(#heroBgGrad)"/>

  <!-- Scattered hearts -->
  <g color="rgba(255,255,255,0.07)">
    <use href="#hdHeart" x="50"   y="40"   width="80"  height="80"/>
    <use href="#hdHeart" x="200"  y="520"  width="100" height="100"/>
    <use href="#hdHeart" x="540"  y="20"   width="60"  height="60"/>
    <use href="#hdHeart" x="780"  y="540"  width="90"  height="90"/>
    <use href="#hdHeart" x="1080" y="60"   width="70"  height="70"/>
    <use href="#hdHeart" x="1080" y="510"  width="80"  height="80"/>
    <use href="#hdHeart" x="20"   y="300"  width="70"  height="70"/>
    <use href="#hdHeart" x="1120" y="280"  width="65"  height="65"/>
  </g>
  <g color="rgba(255,255,255,0.05)">
    <use href="#hdHeart" x="380"  y="40"   width="45"  height="45"/>
    <use href="#hdHeart" x="900"  y="80"   width="45"  height="45"/>
    <use href="#hdHeart" x="650"  y="540"  width="55"  height="55"/>
    <use href="#hdHeart" x="120"  y="180"  width="45"  height="45"/>
  </g>

  <!-- Top dateline -->
  <line x1="100" y1="100" x2="1100" y2="100" stroke="rgba(255,255,255,0.35)" stroke-width="0.75"/>
  <text x="100" y="88" fill="rgba(255,255,255,0.75)" font-size="13" letter-spacing="2" font-weight="500">ESSAY &#183; BUILDING &#183; MAY 2026</text>
  <text x="1100" y="88" text-anchor="end" fill="rgba(255,255,255,0.75)" font-size="13" font-weight="500">Pete Ghiorse</text>

  <!-- Title -->
  <text x="600" y="200" text-anchor="middle" fill="#FFFFFF" font-size="64" font-weight="700" letter-spacing="-1">$500,000 <tspan fill="rgba(255,255,255,0.6)" font-weight="400">vs.</tspan> $2,500</text>

  <!-- Subtitle -->
  <text x="600" y="256" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="22" font-weight="400">What it cost to build the last one,</text>
  <text x="600" y="288" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="22" font-weight="400">and what it&#8217;s cost to build the new one.</text>

  <!-- Comparison bars -->
  <g transform="translate(150, 360)">
    <!-- GiveTide bar -->
    <text x="0" y="0" fill="rgba(255,255,255,0.7)" font-size="13" letter-spacing="2" font-weight="600">GIVETIDE &#183; 2017&#8211;2022</text>
    <rect x="0" y="14" width="900" height="34" rx="2" fill="#1F3D2A"/>
    <text x="910" y="38" fill="#FFFFFF" font-size="20" font-weight="700">$500K+</text>
    <text x="0" y="74" fill="rgba(255,255,255,0.7)" font-size="12">Charitable giving platform &#183; five years &#183; small team &#183; sold to an acquirer</text>

    <!-- Honeydew bar (4.5px = 0.5% of GiveTide bar to scale) -->
    <text x="0" y="124" fill="rgba(255,255,255,0.7)" font-size="13" letter-spacing="2" font-weight="600">HONEYDEW &#183; 2025&#8211;2026</text>
    <rect x="0" y="138" width="4.5" height="34" rx="2" fill="#A8E16C"/>
    <text x="14" y="162" fill="#A8E16C" font-size="20" font-weight="700">~$2.5K</text>
    <text x="0" y="198" fill="rgba(255,255,255,0.7)" font-size="12">Family AI agent &#183; solo &#183; nights and weekends &#183; ~80% of spend went to AI coding tools</text>
  </g>

  <!-- Bottom rule and kicker -->
  <line x1="100" y1="560" x2="1100" y2="560" stroke="rgba(255,255,255,0.35)" stroke-width="0.75"/>
  <text x="600" y="588" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="13" letter-spacing="3" font-weight="500">A 200&#215; COST COLLAPSE, FROM INSIDE TWO PRODUCTS</text>
</svg>
