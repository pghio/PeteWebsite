<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <rect width="1200" height="630" fill="#F4EDE2"/>

  <!-- Top dateline -->
  <line x1="100" y1="100" x2="1100" y2="100" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="100" y="88" fill="#6B5D52" font-size="13" font-style="italic" letter-spacing="2">ESSAY · BUILDING · MAY 2026</text>
  <text x="1100" y="88" text-anchor="end" fill="#6B5D52" font-size="13" font-style="italic">Pete Ghiorse</text>

  <!-- Title -->
  <text x="600" y="190" text-anchor="middle" fill="#1A1A1A" font-size="60" font-weight="700">$500,000  <tspan fill="#6B5D52" font-style="italic" font-weight="400">vs.</tspan>  $5,000</text>

  <!-- Subtitle -->
  <text x="600" y="246" text-anchor="middle" fill="#3A2D24" font-size="22" font-style="italic">What I spent on my last startup,</text>
  <text x="600" y="276" text-anchor="middle" fill="#3A2D24" font-size="22" font-style="italic">and what I've spent on the next one.</text>

  <!-- Comparison bars -->
  <g transform="translate(150, 350)">
    <!-- GiveTide bar -->
    <text x="0" y="0" fill="#6B5D52" font-size="13" font-style="italic" letter-spacing="2">GIVETIDE · 2017–2022</text>
    <rect x="0" y="14" width="900" height="34" fill="#1A1A1A"/>
    <text x="910" y="38" fill="#1A1A1A" font-size="20" font-weight="700">$500K+</text>
    <text x="0" y="74" fill="#6B5D52" font-size="12" font-style="italic">Charitable giving platform · five years · team of contractors and engineers · culminated in acquisition</text>

    <!-- Honeydew bar -->
    <text x="0" y="124" fill="#6B5D52" font-size="13" font-style="italic" letter-spacing="2">HONEYDEW · 2025–2026</text>
    <rect x="0" y="138" width="9" height="34" fill="#A8301B"/>
    <text x="19" y="162" fill="#A8301B" font-size="20" font-weight="700">&lt;$5K</text>
    <text x="0" y="198" fill="#6B5D52" font-size="12" font-style="italic">Family AI agent · several months · solo · same founder · technically more sophisticated</text>
  </g>

  <!-- Bottom rule and kicker -->
  <line x1="100" y1="560" x2="1100" y2="560" stroke="#1A1A1A" stroke-width="0.75"/>
  <text x="600" y="588" text-anchor="middle" fill="#6B5D52" font-size="13" font-style="italic" letter-spacing="3">A 100× COST COLLAPSE, FROM INSIDE TWO STARTUPS</text>
</svg>
