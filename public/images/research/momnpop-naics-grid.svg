<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="Georgia, 'Times New Roman', serif">
  <rect width="900" height="600" fill="#F4EDE2"/>

  <!-- Title -->
  <text x="80" y="60" fill="#1A1A1A" font-size="22" font-weight="700">Six hundred industries. A handful served by software.</text>
  <text x="80" y="86" fill="#6B5D52" font-size="14" font-style="italic">Each square is one of the 620 NAICS-coded industries in the U.S. economy. Filled squares are the verticals</text>
  <text x="80" y="104" fill="#6B5D52" font-size="14" font-style="italic">where dedicated SaaS players have meaningful share. The rest were considered too small to bother with.</text>
  <line x1="80" y1="120" x2="820" y2="120" stroke="#1A1A1A" stroke-width="0.5"/>

  <!-- Grid: 31 cols × 20 rows = 620 squares. cell ~ 22x18, gap 2 -->
  <!-- Filled = first 35 squares (top-left), styled randomly across the grid -->
  <g transform="translate(110, 150)">
    <!-- Build grid programmatically would be ideal; here we'll inline. 31 cols, 20 rows = 620 -->
    <!-- We'll place all 620 cells in default unfilled style, then overlay filled squares -->
    <g fill="none" stroke="#3A2D24" stroke-width="0.6" stroke-opacity="0.55">
      <!-- Row generation done manually. Each cell 22w x 18h, gap 4 -->
      <!-- I'll use a pattern: 31 columns x 20 rows -->
      <!-- Cell origin: x = c * 23, y = r * 19 -->
      <g id="grid">
        <!-- Row 0 -->
        <rect x="0"   y="0"   width="20" height="16"/>
        <rect x="23"  y="0"   width="20" height="16"/>
        <rect x="46"  y="0"   width="20" height="16"/>
        <rect x="69"  y="0"   width="20" height="16"/>
        <rect x="92"  y="0"   width="20" height="16"/>
        <rect x="115" y="0"   width="20" height="16"/>
        <rect x="138" y="0"   width="20" height="16"/>
        <rect x="161" y="0"   width="20" height="16"/>
        <rect x="184" y="0"   width="20" height="16"/>
        <rect x="207" y="0"   width="20" height="16"/>
        <rect x="230" y="0"   width="20" height="16"/>
        <rect x="253" y="0"   width="20" height="16"/>
        <rect x="276" y="0"   width="20" height="16"/>
        <rect x="299" y="0"   width="20" height="16"/>
        <rect x="322" y="0"   width="20" height="16"/>
        <rect x="345" y="0"   width="20" height="16"/>
        <rect x="368" y="0"   width="20" height="16"/>
        <rect x="391" y="0"   width="20" height="16"/>
        <rect x="414" y="0"   width="20" height="16"/>
        <rect x="437" y="0"   width="20" height="16"/>
        <rect x="460" y="0"   width="20" height="16"/>
        <rect x="483" y="0"   width="20" height="16"/>
        <rect x="506" y="0"   width="20" height="16"/>
        <rect x="529" y="0"   width="20" height="16"/>
        <rect x="552" y="0"   width="20" height="16"/>
        <rect x="575" y="0"   width="20" height="16"/>
        <rect x="598" y="0"   width="20" height="16"/>
        <rect x="621" y="0"   width="20" height="16"/>
        <rect x="644" y="0"   width="20" height="16"/>
        <rect x="667" y="0"   width="20" height="16"/>
        <rect x="690" y="0"   width="20" height="16"/>
      </g>
    </g>

    <!-- Programmatic clone via use is painful in inline SVG; instead repeat for remaining 19 rows using a more compact pattern of nested g translates -->
    <g fill="none" stroke="#3A2D24" stroke-width="0.6" stroke-opacity="0.55">
      <use href="#grid" transform="translate(0,19)"/>
      <use href="#grid" transform="translate(0,38)"/>
      <use href="#grid" transform="translate(0,57)"/>
      <use href="#grid" transform="translate(0,76)"/>
      <use href="#grid" transform="translate(0,95)"/>
      <use href="#grid" transform="translate(0,114)"/>
      <use href="#grid" transform="translate(0,133)"/>
      <use href="#grid" transform="translate(0,152)"/>
      <use href="#grid" transform="translate(0,171)"/>
      <use href="#grid" transform="translate(0,190)"/>
      <use href="#grid" transform="translate(0,209)"/>
      <use href="#grid" transform="translate(0,228)"/>
      <use href="#grid" transform="translate(0,247)"/>
      <use href="#grid" transform="translate(0,266)"/>
      <use href="#grid" transform="translate(0,285)"/>
      <use href="#grid" transform="translate(0,304)"/>
      <use href="#grid" transform="translate(0,323)"/>
      <use href="#grid" transform="translate(0,342)"/>
      <use href="#grid" transform="translate(0,361)"/>
    </g>

    <!-- Filled cells: scatter ~35 across the grid to suggest "covered" verticals -->
    <g fill="#A8301B">
      <rect x="46"  y="19"  width="20" height="16"/>
      <rect x="138" y="0"   width="20" height="16"/>
      <rect x="276" y="38"  width="20" height="16"/>
      <rect x="414" y="19"  width="20" height="16"/>
      <rect x="552" y="0"   width="20" height="16"/>
      <rect x="92"  y="76"  width="20" height="16"/>
      <rect x="230" y="95"  width="20" height="16"/>
      <rect x="345" y="114" width="20" height="16"/>
      <rect x="483" y="76"  width="20" height="16"/>
      <rect x="621" y="95"  width="20" height="16"/>
      <rect x="69"  y="152" width="20" height="16"/>
      <rect x="184" y="171" width="20" height="16"/>
      <rect x="299" y="152" width="20" height="16"/>
      <rect x="437" y="190" width="20" height="16"/>
      <rect x="575" y="171" width="20" height="16"/>
      <rect x="46"  y="228" width="20" height="16"/>
      <rect x="207" y="247" width="20" height="16"/>
      <rect x="368" y="247" width="20" height="16"/>
      <rect x="506" y="228" width="20" height="16"/>
      <rect x="667" y="247" width="20" height="16"/>
      <rect x="115" y="285" width="20" height="16"/>
      <rect x="253" y="304" width="20" height="16"/>
      <rect x="391" y="285" width="20" height="16"/>
      <rect x="529" y="304" width="20" height="16"/>
      <rect x="690" y="323" width="20" height="16"/>
      <rect x="0"   y="342" width="20" height="16"/>
      <rect x="161" y="342" width="20" height="16"/>
      <rect x="322" y="361" width="20" height="16"/>
      <rect x="460" y="361" width="20" height="16"/>
      <rect x="598" y="342" width="20" height="16"/>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(110, 555)">
    <rect x="0" y="0" width="14" height="11" fill="#A8301B"/>
    <text x="22" y="10" fill="#1A1A1A" font-size="12" font-style="italic">Verticals with established SaaS coverage</text>

    <rect x="320" y="0" width="14" height="11" fill="none" stroke="#3A2D24" stroke-width="0.8" stroke-opacity="0.8"/>
    <text x="342" y="10" fill="#1A1A1A" font-size="12" font-style="italic">Industries the old economics ignored</text>
  </g>
</svg>
