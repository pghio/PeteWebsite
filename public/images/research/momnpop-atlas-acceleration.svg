<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Georgia, 'Times New Roman', serif">
  <rect width="900" height="460" fill="#F4EDE2"/>

  <!-- Title -->
  <text x="80" y="60" fill="#1A1A1A" font-size="22" font-weight="700">Time to first revenue is collapsing</text>
  <text x="80" y="86" fill="#6B5D52" font-size="14" font-style="italic">Share of Stripe Atlas startups that charged a customer within 30 days of incorporation.</text>
  <line x1="80" y1="100" x2="820" y2="100" stroke="#1A1A1A" stroke-width="0.5"/>

  <!-- Two-stat editorial layout -->
  <!-- Left: 2020 -->
  <g transform="translate(180, 230)">
    <text x="0" y="-90" text-anchor="middle" fill="#6B5D52" font-size="13" font-style="italic" letter-spacing="2">2020</text>
    <!-- Numeral -->
    <text x="0" y="0" text-anchor="middle" fill="#1A1A1A" font-size="120" font-weight="700">8</text>
    <text x="60" y="-40" text-anchor="start" fill="#1A1A1A" font-size="36" font-weight="700">%</text>
    <text x="0" y="50" text-anchor="middle" fill="#3A2D24" font-size="14" font-style="italic">charged a customer</text>
    <text x="0" y="70" text-anchor="middle" fill="#3A2D24" font-size="14" font-style="italic">within 30 days</text>
  </g>

  <!-- Divider arrow -->
  <g transform="translate(450, 230)">
    <line x1="-90" y1="0" x2="80" y2="0" stroke="#A8301B" stroke-width="1.25"/>
    <polygon points="80,0 70,-6 70,6" fill="#A8301B"/>
    <text x="-5" y="-12" text-anchor="middle" fill="#A8301B" font-size="13" font-style="italic">2.5×</text>
  </g>

  <!-- Right: 2025 -->
  <g transform="translate(680, 230)">
    <text x="-15" y="-90" text-anchor="middle" fill="#6B5D52" font-size="13" font-style="italic" letter-spacing="2">2025</text>
    <text x="-15" y="0" text-anchor="middle" fill="#A8301B" font-size="160" font-weight="700">20</text>
    <text x="78" y="-40" text-anchor="start" fill="#A8301B" font-size="48" font-weight="700">%</text>
    <text x="0" y="50" text-anchor="middle" fill="#3A2D24" font-size="14" font-style="italic">charged a customer</text>
    <text x="0" y="70" text-anchor="middle" fill="#3A2D24" font-size="14" font-style="italic">within 30 days</text>
  </g>

  <!-- Bottom rule and caption -->
  <line x1="80" y1="380" x2="820" y2="380" stroke="#1A1A1A" stroke-width="0.5"/>
  <text x="80" y="408" fill="#1A1A1A" font-size="13" font-style="italic">Atlas's 2025 cohort also reached $100k revenue 56% more often than 2024,</text>
  <text x="80" y="428" fill="#1A1A1A" font-size="13" font-style="italic">and the count of companies hitting $10M ARR within three months <tspan font-weight="700">doubled</tspan>.</text>
  <text x="820" y="445" text-anchor="end" fill="#6B5D52" font-size="11" font-style="italic">Source: Stripe Atlas 2025 Year in Review</text>
</svg>
