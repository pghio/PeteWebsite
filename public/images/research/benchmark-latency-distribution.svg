<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="440" fill="transparent"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#334155" font-size="16" font-weight="700">Latency Distribution Across Models</text>
  <text x="450" y="48" text-anchor="middle" fill="#64748b" font-size="12">P5 — P50 — P95 per model (milliseconds, via OpenRouter)</text>

  <!-- Scale: 0 to 10000ms mapped to x=180 to x=860 (680px) -->

  <!-- Gridlines -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="180" y1="80" x2="180" y2="400"/>
    <line x1="316" y1="80" x2="316" y2="400"/>
    <line x1="452" y1="80" x2="452" y2="400"/>
    <line x1="588" y1="80" x2="588" y2="400"/>
    <line x1="724" y1="80" x2="724" y2="400"/>
    <line x1="860" y1="80" x2="860" y2="400"/>
  </g>
  <g font-size="10" fill="#94a3b8" text-anchor="middle">
    <text x="180" y="415">0s</text>
    <text x="316" y="415">2s</text>
    <text x="452" y="415">4s</text>
    <text x="588" y="415">6s</text>
    <text x="724" y="415">8s</text>
    <text x="860" y="415">10s</text>
  </g>
  <text x="520" y="432" text-anchor="middle" fill="#64748b" font-size="11">Latency (ms)</text>

  <!-- GPT-4.1: P5=380, P50=460, P95=739 -->
  <g transform="translate(0, 95)">
    <text x="170" y="5" text-anchor="end" fill="#334155" font-size="12" font-weight="600">GPT-4.1</text>
    <text x="170" y="19" text-anchor="end" fill="#16a34a" font-size="9">mid</text>
    <line x1="205.84" y1="0" x2="230.25" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="205.84" y="-5" width="24.41" height="10" fill="#3b82f6" opacity="0.2"/>
    <rect x="209.24" y="-6" width="3" height="12" fill="#1d4ed8"/>
    <text x="245" y="4" fill="#475569" font-size="10">460ms</text>
  </g>

  <!-- GPT-5.4: P5=396, P50=482, P95=924 -->
  <g transform="translate(0, 132)">
    <text x="170" y="5" text-anchor="end" fill="#334155" font-size="12" font-weight="600">GPT-5.4</text>
    <text x="170" y="19" text-anchor="end" fill="#dc2626" font-size="9">frontier</text>
    <line x1="206.93" y1="0" x2="242.83" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="206.93" y="-5" width="35.90" height="10" fill="#3b82f6" opacity="0.2"/>
    <rect x="212.78" y="-6" width="3" height="12" fill="#1d4ed8"/>
    <text x="256" y="4" fill="#475569" font-size="10">482ms</text>
  </g>

  <!-- Gemini Flash: P5=676, P50=797, P95=1071 -->
  <g transform="translate(0, 169)">
    <text x="170" y="5" text-anchor="end" fill="#334155" font-size="12" font-weight="600">Gemini Flash</text>
    <text x="170" y="19" text-anchor="end" fill="#ca8a04" font-size="9">budget</text>
    <line x1="225.97" y1="0" x2="252.83" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="225.97" y="-5" width="26.86" height="10" fill="#3b82f6" opacity="0.2"/>
    <rect x="234.20" y="-6" width="3" height="12" fill="#1d4ed8"/>
    <text x="266" y="4" fill="#475569" font-size="10">797ms</text>
  </g>

  <!-- GPT-4o-mini: P5=672, P50=974, P95=3568 -->
  <g transform="translate(0, 206)">
    <text x="170" y="5" text-anchor="end" fill="#334155" font-size="12" font-weight="600">GPT-4o-mini</text>
    <text x="170" y="19" text-anchor="end" fill="#ca8a04" font-size="9">budget</text>
    <line x1="225.70" y1="0" x2="422.62" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="225.70" y="-5" width="196.92" height="10" fill="#3b82f6" opacity="0.2"/>
    <rect x="246.23" y="-6" width="3" height="12" fill="#1d4ed8"/>
    <text x="438" y="4" fill="#475569" font-size="10">974ms (P50), 3.6s (P95)</text>
  </g>

  <!-- Claude Sonnet: P5=1580, P50=1872, P95=6911 -->
  <g transform="translate(0, 243)">
    <text x="170" y="5" text-anchor="end" fill="#334155" font-size="12" font-weight="600">Claude Sonnet</text>
    <text x="170" y="19" text-anchor="end" fill="#16a34a" font-size="9">mid</text>
    <line x1="287.44" y1="0" x2="649.95" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="287.44" y="-5" width="362.51" height="10" fill="#3b82f6" opacity="0.2"/>
    <rect x="307.30" y="-6" width="3" height="12" fill="#1d4ed8"/>
    <text x="665" y="4" fill="#475569" font-size="10">1,872ms (P50), 6.9s (P95)</text>
  </g>

  <!-- DeepSeek V3: P5=234, P50=2395, P95=9815 — EXTREME TAIL, red tint -->
  <g transform="translate(0, 280)">
    <text x="170" y="5" text-anchor="end" fill="#334155" font-size="12" font-weight="600">DeepSeek V3</text>
    <text x="170" y="19" text-anchor="end" fill="#ca8a04" font-size="9">budget</text>
    <line x1="195.91" y1="0" x2="847.42" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="195.91" y="-5" width="651.51" height="10" fill="#ef4444" opacity="0.15"/>
    <rect x="322.86" y="-6" width="3" height="12" fill="#1d4ed8"/>
    <text x="325" y="-10" fill="#475569" font-size="9">P50 2.4s</text>
  </g>

  <!-- Claude Haiku: P5=3044, P50=3294, P95=3833 -->
  <g transform="translate(0, 317)">
    <text x="170" y="5" text-anchor="end" fill="#334155" font-size="12" font-weight="600">Claude Haiku</text>
    <text x="170" y="19" text-anchor="end" fill="#ca8a04" font-size="9">budget</text>
    <line x1="386.99" y1="0" x2="440.64" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="386.99" y="-5" width="53.64" height="10" fill="#3b82f6" opacity="0.2"/>
    <rect x="404.00" y="-6" width="3" height="12" fill="#1d4ed8"/>
    <text x="455" y="4" fill="#475569" font-size="10">3,294ms (P50)</text>
  </g>

  <!-- Claude Opus: P5=4781, P50=5420, P95=9335 — SLOW, red tint -->
  <g transform="translate(0, 354)">
    <text x="170" y="5" text-anchor="end" fill="#334155" font-size="12" font-weight="600">Claude Opus</text>
    <text x="170" y="19" text-anchor="end" fill="#dc2626" font-size="9">frontier</text>
    <line x1="505.11" y1="0" x2="814.78" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <rect x="505.11" y="-5" width="309.67" height="10" fill="#ef4444" opacity="0.15"/>
    <rect x="548.56" y="-6" width="3" height="12" fill="#1d4ed8"/>
    <text x="555" y="-10" fill="#475569" font-size="9">P50 5.4s, P95 9.3s</text>
  </g>

  <!-- Callout: 12x spread (sky-blue rounded box on dashed line) -->
  <g>
    <line x1="209" y1="90" x2="549" y2="360" stroke="#0ea5e9" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
    <rect x="380" y="225" width="150" height="44" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="1"/>
    <text x="455" y="243" text-anchor="middle" fill="#075985" font-size="12" font-weight="700">12x spread</text>
    <text x="455" y="260" text-anchor="middle" fill="#075985" font-size="10">fastest to slowest P50</text>
  </g>
</svg>
