<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="800" height="560" fill="#fafafa" rx="12"/>

  <text x="40" y="42" font-size="18" font-weight="700" fill="#1a1a2e">The engine, end to end</text>
  <text x="40" y="64" font-size="12" fill="#6b7280">Production, grading, and serving run unattended. One wire still goes through a human.</text>

  <!-- Row 1: demand -->
  <rect x="40" y="96" width="200" height="78" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="140" y="126" font-size="15" font-weight="600" fill="#1a1a2e" text-anchor="middle">Search Console analyzer</text>
  <text x="140" y="145" font-size="11.5" fill="#6b7280" text-anchor="middle">gaps: 50+ impressions,</text>
  <text x="140" y="160" font-size="11.5" fill="#6b7280" text-anchor="middle">0 clicks, position worse than 10</text>

  <!-- the missing wire -->
  <path d="M240,135 L322,135" stroke="#d9a03f" stroke-width="2" stroke-dasharray="7,6" fill="none"/>
  <path d="M322,135 l-10,-5 v10 z" fill="#d9a03f"/>
  <text x="282" y="120" font-size="11" font-weight="600" fill="#854f0b" text-anchor="middle">the missing wire</text>
  <text x="282" y="156" font-size="10.5" fill="#a3702a" text-anchor="middle">(today: me)</text>

  <!-- Row 1: writer -->
  <rect x="328" y="96" width="200" height="78" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="428" y="126" font-size="15" font-weight="600" fill="#1a1a2e" text-anchor="middle">Writer agent</text>
  <text x="428" y="145" font-size="11.5" fill="#6b7280" text-anchor="middle">3 topics per run, 6-day cooldown,</text>
  <text x="428" y="160" font-size="11.5" fill="#6b7280" text-anchor="middle">every rule a scar</text>

  <!-- writer -> grader -->
  <path d="M528,135 L596,135" stroke="#9ca3af" stroke-width="2" fill="none"/>
  <path d="M596,135 l-10,-5 v10 z" fill="#9ca3af"/>

  <!-- Row 1: grader -->
  <rect x="602" y="96" width="158" height="78" rx="12" fill="#eaf6f0" stroke="#5AAE8A" stroke-width="2"/>
  <text x="681" y="126" font-size="15" font-weight="600" fill="#2D5A3D" text-anchor="middle">Grader model</text>
  <text x="681" y="145" font-size="11.5" fill="#46815f" text-anchor="middle">quality 0–100</text>
  <text x="681" y="160" font-size="11.5" fill="#46815f" text-anchor="middle">spam · PII · schema</text>

  <!-- grader -> publish (passing) -->
  <path d="M650,174 L650,202 L480,202 L480,228" stroke="#5AAE8A" stroke-width="2" fill="none"/>
  <path d="M480,228 l-5,-10 h10 z" fill="#5AAE8A"/>
  <text x="563" y="196" font-size="11.5" font-weight="600" fill="#2D5A3D" text-anchor="middle">passing score</text>

  <!-- grader -> review queue (held) -->
  <path d="M712,174 L712,356" stroke="#d9a03f" stroke-width="2" fill="none"/>
  <path d="M712,356 l-5,-10 h10 z" fill="#d9a03f"/>
  <text x="732" y="262" font-size="11.5" font-weight="600" fill="#854f0b" text-anchor="middle" transform="rotate(90 732 262)">held</text>

  <!-- publish box -->
  <rect x="240" y="234" width="420" height="86" rx="12" fill="#ffffff" stroke="#5AAE8A" stroke-width="1.5"/>
  <text x="450" y="262" font-size="15" font-weight="600" fill="#1a1a2e" text-anchor="middle">Published — discoverable</text>
  <text x="450" y="282" font-size="11.5" fill="#6b7280" text-anchor="middle">server-rendered for every visitor · schema-branched JSON-LD</text>
  <text x="450" y="298" font-size="11.5" fill="#6b7280" text-anchor="middle">sitemap: 1,147 URLs · quality = 30% of ranking</text>

  <!-- review queue box -->
  <rect x="560" y="362" width="200" height="74" rx="12" fill="#fdf3e3" stroke="#d9a03f" stroke-width="1.5"/>
  <text x="660" y="392" font-size="14" font-weight="600" fill="#854f0b" text-anchor="middle">&#9208; Review queue</text>
  <text x="660" y="412" font-size="10.5" fill="#a3702a" text-anchor="middle">held until a human looks</text>

  <!-- publish -> crawlers -->
  <path d="M330,320 L290,352" stroke="#9ca3af" stroke-width="2" fill="none"/>
  <path d="M290,352 l11,-2 l-6,-8 z" fill="#9ca3af"/>

  <!-- serve row -->
  <rect x="40" y="358" width="460" height="84" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="270" y="384" font-size="14" font-weight="600" fill="#1a1a2e" text-anchor="middle">Google + 8 AI crawlers, welcomed by name</text>
  <text x="270" y="405" font-size="10.5" fill="#6b7280" text-anchor="middle">GPTBot · ChatGPT-User · Claude-Web · Anthropic-AI</text>
  <text x="270" y="421" font-size="10.5" fill="#6b7280" text-anchor="middle">PerplexityBot · Cohere-AI · AI2Bot · Google-Extended</text>

  <!-- standing audit loop -->
  <rect x="40" y="472" width="720" height="60" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="400" y="497" font-size="14" font-weight="600" fill="#1a1a2e" text-anchor="middle">Standing audit — re-walks the whole corpus on a schedule</text>
  <text x="400" y="516" font-size="11.5" fill="#6b7280" text-anchor="middle">re-scores drift · files fix suggestions · the tier grades come from here</text>

  <text x="40" y="552" font-size="11" fill="#9ca3af">peterghiorse.com — verified against the production codebase, June 2026</text>
</svg>
