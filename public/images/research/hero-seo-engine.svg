<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="Inter, system-ui, -apple-system, sans-serif">
  <rect width="1200" height="630" fill="#fafafa" rx="16"/>

  <!-- headline block -->
  <text x="64" y="150" font-size="64" font-weight="800" fill="#1a1a2e">1,147 pages.</text>
  <text x="64" y="228" font-size="64" font-weight="800" fill="#1a1a2e">One person.</text>
  <text x="64" y="290" font-size="26" fill="#4b5563">Inside the SEO engine that grades its own work</text>

  <!-- mini pipeline motif -->
  <g font-size="17" font-weight="600">
    <rect x="64" y="350" width="180" height="64" rx="12" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <text x="154" y="376" fill="#1a1a2e" text-anchor="middle">Writer agent</text>
    <text x="154" y="398" font-size="13" font-weight="400" fill="#6b7280" text-anchor="middle">scar-tissue rules</text>

    <rect x="296" y="350" width="180" height="64" rx="12" fill="#ffffff" stroke="#5AAE8A" stroke-width="2"/>
    <text x="386" y="376" fill="#1a1a2e" text-anchor="middle">Grader model</text>
    <text x="386" y="398" font-size="13" font-weight="400" fill="#6b7280" text-anchor="middle">quality · spam · PII</text>

    <rect x="528" y="318" width="190" height="64" rx="12" fill="#eaf6f0" stroke="#5AAE8A" stroke-width="1.5"/>
    <text x="623" y="344" fill="#2D5A3D" text-anchor="middle">Published</text>
    <text x="623" y="366" font-size="13" font-weight="400" fill="#46815f" text-anchor="middle">SSR · JSON-LD · sitemap</text>

    <rect x="528" y="398" width="190" height="64" rx="12" fill="#fdf3e3" stroke="#d9a03f" stroke-width="1.5"/>
    <text x="623" y="424" fill="#854f0b" text-anchor="middle">&#9208; Held for review</text>
    <text x="623" y="446" font-size="13" font-weight="400" fill="#a3702a" text-anchor="middle">score below threshold</text>
  </g>

  <!-- arrows -->
  <g stroke="#9ca3af" stroke-width="2" fill="none">
    <path d="M244,382 L290,382"/>
    <path d="M476,372 L522,352"/>
    <path d="M476,392 L522,426"/>
  </g>
  <g fill="#9ca3af">
    <path d="M290,382 l-9,-5 v10 z"/>
    <path d="M522,352 l-10,-1.5 l4.5,9 z"/>
    <path d="M522,426 l-10,1.5 l4.5,-9 z"/>
  </g>

  <!-- the log line, as the signature detail -->
  <text x="64" y="520" font-size="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#854f0b">&#9208;&#65039; List requires manual review (score: 61)</text>
  <text x="64" y="552" font-size="16" fill="#6b7280">One AI declining to vouch for another AI's work.</text>

  <!-- footer -->
  <text x="64" y="598" font-size="14" fill="#9ca3af">peterghiorse.com — engineering notes from building Honeydew solo</text>
</svg>
