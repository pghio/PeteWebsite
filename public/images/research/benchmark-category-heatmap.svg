    <rect x="620" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="655" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="690" y="0" width="70" height="40" fill="#FBBF24" rx="3"/><text x="725" y="24" text-anchor="middle" fill="#78350F" font-size="12" font-weight="700">33%</text>
