<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="500" fill="transparent"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#431407" font-size="18" font-weight="800">What each model got right, by task type</text>
  <text x="450" y="50" text-anchor="middle" fill="#78716C" font-size="12">Greener = easier for that model. Amber = mixed. Red = widely failing.</text>

  <!-- Model column headers (rotated) -->
  <g font-size="11" fill="#431407" font-weight="600">
    <text x="235" y="95" text-anchor="start" transform="rotate(-35 235 95)">GPT-4o-mini</text>
    <text x="305" y="95" text-anchor="start" transform="rotate(-35 305 95)">Gemini Flash</text>
    <text x="375" y="95" text-anchor="start" transform="rotate(-35 375 95)">DeepSeek V3</text>
    <text x="445" y="95" text-anchor="start" transform="rotate(-35 445 95)">Claude Haiku</text>
    <text x="515" y="95" text-anchor="start" transform="rotate(-35 515 95)">GPT-4.1</text>
    <text x="585" y="95" text-anchor="start" transform="rotate(-35 585 95)">Claude Sonnet</text>
    <text x="655" y="95" text-anchor="start" transform="rotate(-35 655 95)">GPT-5.4</text>
    <text x="725" y="95" text-anchor="start" transform="rotate(-35 725 95)">Claude Opus</text>
  </g>

  <!-- Tier markers -->
  <g>
    <rect x="200" y="60" width="240" height="4" fill="#F59E0B" opacity="0.5"/>
    <text x="320" y="72" text-anchor="middle" fill="#B45309" font-size="9" font-weight="700" letter-spacing="1">BUDGET ($0.15 – $1/M)</text>
