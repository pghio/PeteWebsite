  <g transform="translate(0, 300)">
    <text x="190" y="20" text-anchor="end" fill="#431407" font-size="12" font-weight="600">Multi-step requests</text>
    <rect x="200" y="0" width="70" height="40" fill="#BEF264" rx="3"/><text x="235" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">83%</text>
    <rect x="270" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="305" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="340" y="0" width="70" height="40" fill="#FCD34D" rx="3"/><text x="375" y="24" text-anchor="middle" fill="#78350F" font-size="12" font-weight="700">67%</text>
    <rect x="410" y="0" width="70" height="40" fill="#BEF264" rx="3"/><text x="445" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">83%</text>
    <rect x="480" y="0" width="70" height="40" fill="#BEF264" rx="3"/><text x="515" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">83%</text>
    <rect x="550" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="585" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="620" y="0" width="70" height="40" fill="#BEF264" rx="3"/><text x="655" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">83%</text>
    <rect x="690" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="725" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
  </g>

