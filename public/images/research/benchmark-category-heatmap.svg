    <text x="515" y="72" text-anchor="middle" fill="#3F6212" font-size="9" font-weight="700" letter-spacing="1">MID ($2 – $3/M)</text>
    <rect x="590" y="60" width="140" height="4" fill="#B91C1C" opacity="0.5"/>
    <text x="660" y="72" text-anchor="middle" fill="#7F1D1D" font-size="9" font-weight="700" letter-spacing="1">FRONTIER ($10 – $15/M)</text>
  </g>

  <!-- Custom color cells: green = 85+, amber = 50-84, red = <50 -->
  <!-- Clear Intent -->
  <g transform="translate(0, 120)">
    <text x="190" y="20" text-anchor="end" fill="#431407" font-size="12" font-weight="600">Clear commands</text>
    <rect x="200" y="0" width="70" height="40" fill="#BEF264" rx="3"/><text x="235" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">75%</text>
    <rect x="270" y="0" width="70" height="40" fill="#A3E635" rx="3"/><text x="305" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">88%</text>
    <rect x="340" y="0" width="70" height="40" fill="#A3E635" rx="3"/><text x="375" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">88%</text>
    <rect x="410" y="0" width="70" height="40" fill="#A3E635" rx="3"/><text x="445" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">88%</text>
    <rect x="480" y="0" width="70" height="40" fill="#A3E635" rx="3"/><text x="515" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">88%</text>
    <rect x="550" y="0" width="70" height="40" fill="#A3E635" rx="3"/><text x="585" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">88%</text>
    <rect x="620" y="0" width="70" height="40" fill="#A3E635" rx="3"/><text x="655" y="24" text-anchor="middle" fill="#365314" font-size="12" font-weight="700">88%</text>
    <rect x="690" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="725" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
  </g>

