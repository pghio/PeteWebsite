    <rect x="200" y="0" width="70" height="40" fill="#EF4444" rx="3"/><text x="235" y="24" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">0%</text>
    <rect x="270" y="0" width="70" height="40" fill="#FBBF24" rx="3"/><text x="305" y="24" text-anchor="middle" fill="#78350F" font-size="12" font-weight="700">42%</text>
    <rect x="340" y="0" width="70" height="40" fill="#EF4444" rx="3"/><text x="375" y="24" text-anchor="middle" fill="#fff" font-size="12" font-weight="800">0%</text>
