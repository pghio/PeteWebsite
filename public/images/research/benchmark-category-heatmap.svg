  <g transform="translate(0, 345)">
    <text x="190" y="20" text-anchor="end" fill="#431407" font-size="12" font-weight="600">Typos & noise</text>
    <rect x="200" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="235" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="270" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="305" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="340" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="375" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="410" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="445" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="480" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="515" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="550" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="585" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="620" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="655" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
    <rect x="690" y="0" width="70" height="40" fill="#84CC16" rx="3"/><text x="725" y="24" text-anchor="middle" fill="#1A2E05" font-size="12" font-weight="800">100%</text>
  </g>

  <!-- Callouts -->
  <g>
    <rect x="770" y="255" width="115" height="40" rx="6" fill="#84CC16" fill-opacity="0.12" stroke="#84CC16" stroke-width="1"/>
    <text x="827" y="272" text-anchor="middle" fill="#3F6212" font-size="9" font-weight="700">CEILING</text>
    <text x="827" y="286" text-anchor="middle" fill="#3F6212" font-size="9">4 of 6 tasks</text>

    <rect x="770" y="345" width="115" height="40" rx="6" fill="#84CC16" fill-opacity="0.12" stroke="#84CC16" stroke-width="1"/>
    <text x="827" y="362" text-anchor="middle" fill="#3F6212" font-size="9" font-weight="700">SOLVED</text>
    <text x="827" y="376" text-anchor="middle" fill="#3F6212" font-size="9">every model</text>

    <rect x="770" y="210" width="115" height="40" rx="6" fill="#EF4444" fill-opacity="0.12" stroke="#EF4444" stroke-width="1"/>
    <text x="827" y="227" text-anchor="middle" fill="#7F1D1D" font-size="9" font-weight="700">100pp SPREAD</text>
    <text x="827" y="241" text-anchor="middle" fill="#7F1D1D" font-size="9">price doesn't help</text>
  </g>

  <!-- Caption -->
  <text x="450" y="465" text-anchor="middle" fill="#78716C" font-size="11">On 4 of 6 task types, every model from $0.15/M to $15/M performed within spitting distance.</text>
  <text x="450" y="482" text-anchor="middle" fill="#78716C" font-size="11">The real differences show up on ambiguity and conversational input — and price doesn't solve them.</text>
</svg>
