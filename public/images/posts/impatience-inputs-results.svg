<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Georgia, 'Times New Roman', serif">
  <rect width="900" height="520" fill="#F4EDE2"/>

  <text x="80" y="64" fill="#1A1A1A" font-size="24" font-weight="700">Where to aim your impatience</text>
  <text x="80" y="92" fill="#6B5D52" font-size="14" font-style="italic">Inputs are the only leading indicator you control. Results are a lagging function of a world that doesn't consult you.</text>
  <line x1="80" y1="108" x2="820" y2="108" stroke="#1A1A1A" stroke-width="0.5"/>

  <!-- vertical divider -->
  <line x1="450" y1="150" x2="450" y2="430" stroke="#1A1A1A" stroke-width="0.5" stroke-dasharray="2 4"/>

  <!-- LEFT: inputs -->
  <text x="80" y="158" fill="#A8301B" font-size="12" font-weight="700" letter-spacing="3">INPUTS</text>
  <text x="80" y="192" fill="#1A1A1A" font-size="20" font-weight="700">The work you control</text>
  <g fill="#3A2D24" font-size="17" font-style="italic">
    <text x="80" y="238">Focused</text>
    <text x="80" y="272">Impatient</text>
    <text x="80" y="306">Exacting</text>
  </g>
  <text x="80" y="372" fill="#A8301B" font-size="13" font-style="italic">Impatience aimed here is called</text>
  <text x="80" y="392" fill="#A8301B" font-size="18" font-weight="700">focus.</text>

  <!-- RIGHT: results -->
  <text x="480" y="158" fill="#6B5D52" font-size="12" font-weight="700" letter-spacing="3">RESULTS</text>
  <text x="480" y="192" fill="#1A1A1A" font-size="20" font-weight="700">The world you don't</text>
  <g fill="#3A2D24" font-size="17" font-style="italic">
    <text x="480" y="238">Patient</text>
    <text x="480" y="272">Understanding</text>
    <text x="480" y="306">Unhurried</text>
  </g>
  <text x="480" y="372" fill="#6B5D52" font-size="13" font-style="italic">Impatience aimed here is called</text>
  <text x="480" y="392" fill="#6B5D52" font-size="18" font-weight="700">anxiety.</text>

  <line x1="80" y1="452" x2="820" y2="452" stroke="#1A1A1A" stroke-width="0.5"/>
  <text x="80" y="484" fill="#1A1A1A" font-size="14" font-style="italic">The frictionless pitch trains the inversion: impatient for results, careless with inputs.</text>
</svg>
