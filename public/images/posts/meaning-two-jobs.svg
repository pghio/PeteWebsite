<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="900" height="520" fill="#F4EDE2"/>

  <!-- title -->
  <text x="450" y="60" text-anchor="middle" fill="#1A1A1A" font-size="30" font-weight="700">Every job is two jobs</text>
  <text x="450" y="90" text-anchor="middle" fill="#6B5D52" font-size="15">The machine takes one half. The price moves to the other.</text>

  <!-- column headers -->
  <text x="440" y="160" text-anchor="middle" fill="#6B5D52" font-size="13" font-weight="700" letter-spacing="2">THE HALF THE MACHINE TAKES</text>
  <text x="720" y="160" text-anchor="middle" fill="#A8301B" font-size="13" font-weight="700" letter-spacing="2">THE HALF THAT GETS PRECIOUS</text>
  <line x1="80" y1="176" x2="820" y2="176" stroke="#1A1A1A" stroke-width="0.6"/>

  <!-- rows -->
  <g font-size="16">
    <text x="80" y="232" fill="#1A1A1A" font-weight="700" font-size="17">Reading a scan</text>
    <text x="440" y="232" text-anchor="middle" fill="#6B5D52">spotting the pattern</text>
    <text x="720" y="232" text-anchor="middle" fill="#1A1A1A" font-weight="600">judging what it means</text>
    <line x1="80" y1="262" x2="820" y2="262" stroke="#9A8C7B" stroke-width="0.4"/>

    <text x="80" y="318" fill="#1A1A1A" font-weight="700" font-size="17">Writing</text>
    <text x="440" y="318" text-anchor="middle" fill="#6B5D52">producing the prose</text>
    <text x="720" y="318" text-anchor="middle" fill="#1A1A1A" font-weight="600">meaning something by it</text>
    <line x1="80" y1="348" x2="820" y2="348" stroke="#9A8C7B" stroke-width="0.4"/>

    <text x="80" y="404" fill="#1A1A1A" font-weight="700" font-size="17">Your job</text>
    <text x="440" y="404" text-anchor="middle" fill="#6B5D52">the part you can describe</text>
    <text x="720" y="404" text-anchor="middle" fill="#A8301B" font-weight="700">the part you must decide</text>
  </g>

  <line x1="80" y1="448" x2="820" y2="448" stroke="#1A1A1A" stroke-width="0.6"/>
  <text x="80" y="482" fill="#3A2D24" font-size="14">Two centuries of the same move: execution gets cheap, judgment gets scarce.</text>
</svg>
