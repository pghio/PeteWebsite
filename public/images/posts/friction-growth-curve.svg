<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="900" height="520" fill="#F4EDE2"/>

  <text x="80" y="64" fill="#1A1A1A" font-size="24" font-weight="700">Where growth lives</text>
  <text x="80" y="92" fill="#6B5D52" font-size="14" font-style="italic">Too little friction and we soften. Too much and we break. We become ourselves in the band between.</text>
  <line x1="80" y1="108" x2="820" y2="108" stroke="#1A1A1A" stroke-width="0.5"/>

  <!-- shaded forge band -->
  <rect x="330" y="150" width="280" height="280" fill="#A8301B" opacity="0.07"/>

  <!-- axes -->
  <line x1="120" y1="430" x2="820" y2="430" stroke="#1A1A1A" stroke-width="0.75"/>
  <line x1="120" y1="430" x2="120" y2="150" stroke="#1A1A1A" stroke-width="0.75"/>

  <!-- zone dividers -->
  <line x1="330" y1="430" x2="330" y2="160" stroke="#6B5D52" stroke-width="0.5" stroke-dasharray="2 4"/>
  <line x1="610" y1="430" x2="610" y2="160" stroke="#6B5D52" stroke-width="0.5" stroke-dasharray="2 4"/>

  <!-- the inverted-U curve -->
  <path d="M140,418 C300,418 340,182 470,182 C600,182 670,418 800,418" fill="none" stroke="#1A1A1A" stroke-width="2"/>

  <!-- peak marker -->
  <circle cx="470" cy="182" r="4" fill="#A8301B"/>
  <text x="470" y="168" text-anchor="middle" fill="#A8301B" font-size="13" font-style="italic">the most you</text>

  <!-- "frictionless" callout, far left -->
  <line x1="175" y1="408" x2="175" y2="250" stroke="#A8301B" stroke-width="0.75" stroke-dasharray="3 3"/>
  <text x="183" y="250" fill="#A8301B" font-size="12" font-style="italic">what “frictionless”</text>
  <text x="183" y="266" fill="#A8301B" font-size="12" font-style="italic">sells you</text>

  <!-- zone labels -->
  <g text-anchor="middle">
    <text x="225" y="455" fill="#6B5D52" font-size="12" font-weight="700" letter-spacing="2">ATROPHY</text>
    <text x="470" y="455" fill="#A8301B" font-size="12" font-weight="700" letter-spacing="2">THE FORGE</text>
    <text x="715" y="455" fill="#6B5D52" font-size="12" font-weight="700" letter-spacing="2">BREAKDOWN</text>
  </g>

  <!-- axis labels -->
  <text x="470" y="486" text-anchor="middle" fill="#1A1A1A" font-size="12" letter-spacing="2">FRICTION  /  EFFORT  →</text>
  <text x="92" y="290" text-anchor="middle" fill="#1A1A1A" font-size="12" letter-spacing="2" transform="rotate(-90 92 290)">WHO YOU BECOME</text>
</svg>
