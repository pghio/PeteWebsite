<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Helvetica Neue', sans-serif">
  <!-- Onboarding-matched green gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%" gradientTransform="rotate(20)">
      <stop offset="0%" stop-color="#5AAE8A"/>
      <stop offset="50%" stop-color="#48946F"/>
      <stop offset="100%" stop-color="#3A7A56"/>
    </linearGradient>
    <!-- Honeydew heart symbol (matches HoneydewHeartIcon.tsx path) -->
    <symbol id="hdHeart" viewBox="0 0 512 512">
      <path d="M256 380 C 200 340, 152 300, 136 250 C 120 200, 144 165, 184 160 C 216 155, 240 165, 256 185 C 272 165, 296 155, 328 160 C 368 165, 392 200, 376 250 C 360 300, 312 340, 256 380 Z" fill="currentColor"/>
    </symbol>
    <!-- Soft white halo behind hero -->
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <!-- Scattered floating hearts at white-7% opacity (matches onboarding) -->
  <g color="rgba(255,255,255,0.07)" opacity="1">
    <use href="#hdHeart" x="60"   y="40"   width="90"  height="90"/>
    <use href="#hdHeart" x="280"  y="700"  width="140" height="140"/>
    <use href="#hdHeart" x="420"  y="120"  width="70"  height="70"/>
    <use href="#hdHeart" x="700"  y="780"  width="110" height="110"/>
    <use href="#hdHeart" x="900"  y="60"   width="85"  height="85"/>
    <use href="#hdHeart" x="1100" y="720"  width="130" height="130"/>
    <use href="#hdHeart" x="1280" y="80"   width="100" height="100"/>
    <use href="#hdHeart" x="1480" y="380"  width="80"  height="80"/>
    <use href="#hdHeart" x="40"   y="430"  width="120" height="120"/>
    <use href="#hdHeart" x="1500" y="780"  width="70"  height="70"/>
    <use href="#hdHeart" x="220"  y="220"  width="55"  height="55"/>
    <use href="#hdHeart" x="1340" y="540"  width="90"  height="90"/>
  </g>
  <g color="rgba(255,255,255,0.05)">
    <use href="#hdHeart" x="540"  y="40"   width="60"  height="60"/>
    <use href="#hdHeart" x="780"  y="200"  width="50"  height="50"/>
    <use href="#hdHeart" x="1190" y="240"  width="55"  height="55"/>
    <use href="#hdHeart" x="160"  y="800"  width="60"  height="60"/>
    <use href="#hdHeart" x="960"  y="430"  width="45"  height="45"/>
  </g>

  <!-- Top rule + dateline -->
  <line x1="100" y1="80" x2="1500" y2="80" stroke="rgba(255,255,255,0.35)" stroke-width="0.75"/>
  <text x="100" y="68" fill="rgba(255,255,255,0.75)" font-size="13" letter-spacing="2" font-weight="500">HONEYDEW · ARCHITECTURE · MAY 2026</text>
  <text x="1500" y="68" text-anchor="end" fill="rgba(255,255,255,0.75)" font-size="13" font-weight="500">Pete Ghiorse</text>

  <!-- Title -->
  <text x="800" y="148" text-anchor="middle" fill="#FFFFFF" font-size="52" font-weight="700" letter-spacing="-0.5">The Stack Underneath</text>

  <!-- Subtitle -->
  <text x="800" y="198" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="22" font-weight="400">What $5K actually built — one solo dev, an LLM agent,</text>
  <text x="800" y="228" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-size="22" font-weight="400">and a family graph that survives tired parents at 9 PM.</text>

  <!-- Top row: INTERPRET → PLAN → EXECUTE -->

  <!-- Box 1: INTERPRET -->
  <g transform="translate(160, 290)">
    <rect width="380" height="200" rx="14" fill="rgba(255,255,255,0.96)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="24" y="42" fill="#5AAE8A" font-size="12" letter-spacing="2" font-weight="700">STAGE 01</text>
    <text x="24" y="100" fill="#1F3D2A" font-size="34" font-weight="700">INTERPRET</text>
    <text x="24" y="132" fill="#3D5546" font-size="15">LLM + system prompt</text>
    <text x="24" y="154" fill="#3D5546" font-size="15">+ family context</text>
    <text x="24" y="186" fill="#3A7A56" font-size="14" font-weight="700">Resolves anaphora across turns</text>
  </g>

  <!-- Arrow 1 → 2 -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="2.5" fill="none">
    <line x1="540" y1="390" x2="600" y2="390"/>
    <polygon points="600,383 615,390 600,397" fill="rgba(255,255,255,0.85)"/>
  </g>

  <!-- Box 2: PLAN -->
  <g transform="translate(615, 290)">
    <rect width="380" height="200" rx="14" fill="rgba(255,255,255,0.96)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="24" y="42" fill="#5AAE8A" font-size="12" letter-spacing="2" font-weight="700">STAGE 02</text>
    <text x="24" y="100" fill="#1F3D2A" font-size="34" font-weight="700">PLAN</text>
    <text x="24" y="132" fill="#3D5546" font-size="15">Pick tools, batch actions,</text>
    <text x="24" y="154" fill="#3D5546" font-size="15">verify intent</text>
    <text x="24" y="186" fill="#3A7A56" font-size="14" font-weight="700">Idempotent · clarifies under doubt</text>
  </g>

  <!-- Arrow 2 → 3 -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="2.5" fill="none">
    <line x1="995" y1="390" x2="1055" y2="390"/>
    <polygon points="1055,383 1070,390 1055,397" fill="rgba(255,255,255,0.85)"/>
  </g>

  <!-- Box 3: EXECUTE -->
  <g transform="translate(1070, 290)">
    <rect width="380" height="200" rx="14" fill="rgba(255,255,255,0.96)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="24" y="42" fill="#5AAE8A" font-size="12" letter-spacing="2" font-weight="700">STAGE 03</text>
    <text x="24" y="100" fill="#1F3D2A" font-size="34" font-weight="700">EXECUTE</text>
    <text x="24" y="132" fill="#3D5546" font-size="15">Postgres · Redis · APIs</text>
    <text x="24" y="154" fill="#3D5546" font-size="15">WebSocket fanout</text>
    <text x="24" y="186" fill="#3A7A56" font-size="14" font-weight="700">Transactional · realtime sync</text>
  </g>

  <!-- Input arrow (voice/text in) -->
  <text x="50" y="378" fill="rgba(255,255,255,0.75)" font-size="14" font-weight="500">voice /</text>
  <text x="50" y="400" fill="rgba(255,255,255,0.75)" font-size="14" font-weight="500">text in</text>
  <g stroke="rgba(255,255,255,0.85)" stroke-width="2.5" fill="none">
    <line x1="115" y1="390" x2="145" y2="390"/>
    <polygon points="145,383 160,390 145,397" fill="rgba(255,255,255,0.85)"/>
  </g>

  <!-- Output arrow (response out) -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="2.5" fill="none">
    <line x1="1450" y1="390" x2="1490" y2="390"/>
    <polygon points="1490,383 1505,390 1490,397" fill="rgba(255,255,255,0.85)"/>
  </g>
  <text x="1515" y="378" fill="rgba(255,255,255,0.75)" font-size="14" font-weight="500">response</text>
  <text x="1515" y="400" fill="rgba(255,255,255,0.75)" font-size="14" font-weight="500">+ effects</text>

  <!-- Bottom row: FAMILY GRAPH + MEMORY (single wide box) -->
  <g transform="translate(400, 630)">
    <rect width="800" height="160" rx="14" fill="rgba(255,255,255,0.96)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
    <text x="24" y="42" fill="#5AAE8A" font-size="12" letter-spacing="2" font-weight="700">STATE · MEMORY · LEARNING LOOP</text>
    <text x="24" y="92" fill="#1F3D2A" font-size="30" font-weight="700">FAMILY GRAPH</text>
    <text x="24" y="124" fill="#3D5546" font-size="15">Multi-tenant state. Roles, kids, calendars, lists, prior turns —</text>
    <text x="24" y="150" fill="#3A7A56" font-size="14" font-weight="700">permissioned, persistent, and remembered across the whole household.</text>
  </g>

  <!-- Down arrow: EXECUTE → FAMILY GRAPH (writes state, solid) -->
  <g stroke="rgba(255,255,255,0.85)" stroke-width="2.5" fill="none">
    <path d="M 1180 490 L 1180 560 L 1000 560 L 1000 625"/>
    <polygon points="993,610 1000,625 1007,610" fill="rgba(255,255,255,0.85)"/>
  </g>
  <text x="1020" y="555" fill="rgba(255,255,255,0.75)" font-size="13" font-style="italic">writes state + patterns</text>

  <!-- Up arrow: FAMILY GRAPH → INTERPRET (feeds context, dashed) -->
  <g stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none" stroke-dasharray="8,5">
    <path d="M 600 630 L 600 555 L 350 555 L 350 495"/>
    <polygon points="343,510 350,495 357,510" fill="rgba(255,255,255,0.55)"/>
  </g>
  <text x="370" y="548" fill="rgba(255,255,255,0.75)" font-size="13" font-style="italic">feeds context + priors</text>

  <!-- Bottom rule + kicker -->
  <line x1="100" y1="840" x2="1500" y2="840" stroke="rgba(255,255,255,0.35)" stroke-width="0.75"/>
  <text x="800" y="872" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="13" letter-spacing="3" font-weight="500">ONE PIPELINE · ONE DEV · $5K ALL-IN · GETHONEYDEW.APP</text>
</svg>
