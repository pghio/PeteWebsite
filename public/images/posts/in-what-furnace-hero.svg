<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#F4EDE2"/>

  <defs>
    <marker id="ink" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="600" y="64" text-anchor="middle" fill="#1A1A1A" font-size="40" font-weight="700">Do the work. Then let it go.</text>
  <text x="600" y="97" text-anchor="middle" fill="#6B5D52" font-size="18">The results aren't yours to expect. They're yours to learn from.</text>

  <!-- loop -->
  <path d="M435,400 A165,165 0 0 1 765,400" fill="none" stroke="#1A1A1A" stroke-width="2.5" marker-end="url(#ink)"/>
  <path d="M765,400 A165,165 0 0 1 435,400" fill="none" stroke="#1A1A1A" stroke-width="2.5" marker-end="url(#ink)"/>

  <!-- arc links (the real transitions) -->
  <text x="600" y="210" text-anchor="middle" fill="#3A2D24" font-size="17">they come in their own time</text>
  <text x="600" y="602" text-anchor="middle" fill="#3A2D24" font-size="17">you take the lesson, and go again</text>

  <!-- nodes -->
  <circle cx="435" cy="400" r="6" fill="#1A1A1A"/>
  <circle cx="765" cy="400" r="6" fill="#1A1A1A"/>
  <text x="414" y="395" text-anchor="end" fill="#1A1A1A" font-size="21" font-weight="700">THE WORK</text>
  <text x="414" y="417" text-anchor="end" fill="#A8301B" font-size="15" font-weight="600">push hard</text>
  <text x="786" y="395" text-anchor="start" fill="#1A1A1A" font-size="21" font-weight="700">THE RESULTS</text>
  <text x="786" y="417" text-anchor="start" fill="#6B5D52" font-size="15">let them come</text>
</svg>
