<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#F4EDE2"/>

  <defs>
    <marker id="rust" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A8301B"/>
    </marker>
    <marker id="ink" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="600" y="66" text-anchor="middle" fill="#1A1A1A" font-size="40" font-weight="700">Push hard. Let go. Repeat.</text>
  <text x="600" y="98" text-anchor="middle" fill="#6B5D52" font-size="18">Drive on the part you control. Be patient with the part you don't.</text>

  <!-- top arc: the work -> the outcome (push) -->
  <path d="M435,395 A165,165 0 0 1 765,395" fill="none" stroke="#A8301B" stroke-width="3.5" marker-end="url(#rust)"/>
  <!-- bottom arc: the outcome -> the work (patience) -->
  <path d="M765,395 A165,165 0 0 1 435,395" fill="none" stroke="#1A1A1A" stroke-width="3.5" marker-end="url(#ink)"/>

  <!-- nodes -->
  <circle cx="435" cy="395" r="6" fill="#1A1A1A"/>
  <circle cx="765" cy="395" r="6" fill="#1A1A1A"/>
  <text x="414" y="390" text-anchor="end" fill="#1A1A1A" font-size="21" font-weight="700">THE WORK</text>
  <text x="414" y="412" text-anchor="end" fill="#6B5D52" font-size="15">what you control</text>
  <text x="786" y="390" text-anchor="start" fill="#1A1A1A" font-size="21" font-weight="700">THE OUTCOME</text>
  <text x="786" y="412" text-anchor="start" fill="#6B5D52" font-size="15">how it turns out</text>

  <!-- arc mode labels -->
  <text x="600" y="200" text-anchor="middle" fill="#A8301B" font-size="24" font-weight="700">PUSH HARD</text>
  <text x="600" y="223" text-anchor="middle" fill="#6B5D52" font-size="15">this part is yours</text>
  <text x="600" y="590" text-anchor="middle" fill="#1A1A1A" font-size="24" font-weight="700">BE PATIENT</text>
  <text x="600" y="613" text-anchor="middle" fill="#6B5D52" font-size="15">this part isn't</text>
</svg>
