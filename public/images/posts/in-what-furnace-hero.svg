<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <rect width="1200" height="630" fill="#F4EDE2"/>

  <defs>
    <marker id="ax" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A1A"/>
    </marker>
  </defs>

  <!-- centered title -->
  <text x="600" y="66" text-anchor="middle" fill="#1A1A1A" font-size="40" font-weight="700">Same drive. Opposite peace.</text>
  <text x="600" y="98" text-anchor="middle" fill="#6B5D52" font-size="18">It isn't how hard you push. It's what you aim it at.</text>

  <!-- axes -->
  <line x1="210" y1="510" x2="1015" y2="510" stroke="#1A1A1A" stroke-width="0.9" marker-end="url(#ax)"/>
  <line x1="210" y1="510" x2="210" y2="148" stroke="#1A1A1A" stroke-width="0.9" marker-end="url(#ax)"/>

  <!-- axis labels (the quantities being measured) -->
  <text x="612" y="552" text-anchor="middle" fill="#1A1A1A" font-size="16" font-weight="600" letter-spacing="1">DRIVE&#160;&#160;·&#160;&#160;HOW HARD YOU PUSH</text>
  <text x="168" y="330" text-anchor="middle" fill="#1A1A1A" font-size="16" font-weight="600" letter-spacing="1" transform="rotate(-90 168 330)">PEACE&#160;&#160;·&#160;&#160;PRESENCE</text>

  <!-- the two paths: same drive, different target -->
  <path d="M232,360 C 480,330 720,255 1000,238" fill="none" stroke="#A8301B" stroke-width="3"/>
  <path d="M232,360 C 480,398 740,468 1000,482" fill="none" stroke="#9A8C7B" stroke-width="3"/>

  <!-- shared origin + endpoints -->
  <circle cx="232" cy="360" r="4.5" fill="#1A1A1A"/>
  <circle cx="1000" cy="238" r="5" fill="#A8301B"/>
  <circle cx="1000" cy="482" r="5" fill="#9A8C7B"/>

  <!-- line labels -->
  <text x="690" y="220" fill="#A8301B" font-size="19" font-weight="700">aimed at your inputs</text>
  <text x="690" y="243" fill="#6B5D52" font-size="14">the part you control</text>
  <text x="690" y="502" fill="#8A7E70" font-size="19" font-weight="700">aimed at your results</text>
  <text x="690" y="525" fill="#6B5D52" font-size="14">the part you don't</text>
</svg>
